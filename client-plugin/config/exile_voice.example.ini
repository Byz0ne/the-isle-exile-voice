# Exile Voice client plugin config.
#
# Install location on Windows:
# %APPDATA%\Mumble\Mumble\Plugins\exile_voice.ini
#
# Most players only need server_host and server_port.

# Your Exile bridge / falloff server host.
server_host=YOUR_SERVER_IP_OR_HOSTNAME

# TCP port used by the Exile falloff server.
server_port=8890

# Must match falloff_server.api_key on the server bridge.
api_key=CHANGE_ME_SHARED_KEY

# 1 = plugin active, 0 = installed but idle.
enabled=1

# 1 = write exile_voice.log beside the plugin DLL.
debug_log=1

# Gain smoothing. Higher is smoother but reacts slower.
smoothing=0.80

# Stereo pan smoothing. Higher is smoother but reacts slower.
pan_smoothing=0.95

# Seconds between reconnect attempts when the bridge is offline.
reconnect_sec=8
